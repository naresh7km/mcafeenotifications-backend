<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Push Admin</title>
<style>
    * { box-sizing: border-box; }
    body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        background: #0f1115;
        color: #e6e6e6;
        margin: 0;
        padding: 32px 16px;
        min-height: 100vh;
    }
    .wrap { max-width: 720px; margin: 0 auto; }
    h1 { font-size: 22px; margin: 0 0 24px; font-weight: 600; }
    .card {
        background: #181b22;
        border: 1px solid #2a2f3a;
        border-radius: 8px;
        padding: 20px;
        margin-bottom: 16px;
    }
    .card h2 { margin: 0 0 16px; font-size: 14px; text-transform: uppercase; letter-spacing: 0.5px; color: #9aa0ab; font-weight: 600; }
    label { display: block; font-size: 13px; margin-bottom: 6px; color: #9aa0ab; }
    input, textarea {
        width: 100%;
        background: #0f1115;
        border: 1px solid #2a2f3a;
        color: #e6e6e6;
        padding: 10px 12px;
        border-radius: 6px;
        font-size: 14px;
        font-family: inherit;
        margin-bottom: 12px;
    }
    input:focus, textarea:focus { outline: none; border-color: #4a90e2; }
    textarea { resize: vertical; min-height: 70px; }
    button {
        background: #4a90e2;
        color: white;
        border: none;
        padding: 10px 18px;
        border-radius: 6px;
        font-size: 14px;
        font-weight: 600;
        cursor: pointer;
        transition: background 0.15s;
    }
    button:hover { background: #3a7bc8; }
    button:disabled { background: #2a2f3a; cursor: not-allowed; }
    button.secondary { background: transparent; border: 1px solid #2a2f3a; }
    button.secondary:hover { background: #2a2f3a; }
    .stat-row { display: flex; align-items: baseline; gap: 12px; }
    .stat-num { font-size: 36px; font-weight: 700; color: #4a90e2; }
    .stat-label { color: #9aa0ab; font-size: 14px; }
    .row { display: flex; gap: 8px; align-items: center; }
    .row > * { flex: 1; }
    .row > button { flex: 0 0 auto; }
    .result {
        margin-top: 14px;
        padding: 10px 12px;
        border-radius: 6px;
        font-size: 13px;
        font-family: ui-monospace, monospace;
        white-space: pre-wrap;
        word-break: break-all;
    }
    .result.ok { background: rgba(40, 180, 90, 0.1); border: 1px solid rgba(40, 180, 90, 0.3); color: #6dd49b; }
    .result.err { background: rgba(220, 60, 60, 0.1); border: 1px solid rgba(220, 60, 60, 0.3); color: #e57b7b; }
    .endpoints { margin-top: 12px; font-family: ui-monospace, monospace; font-size: 12px; color: #6c7280; max-height: 160px; overflow-y: auto; }
    .endpoints div { padding: 4px 0; border-bottom: 1px solid #2a2f3a; }
    .muted { color: #6c7280; font-size: 12px; margin-top: 8px; }
</style>
</head>
<body>
<div class="wrap">
    <h1>Push Notification Admin</h1>

    <div class="card">
        <h2>Auth</h2>
        <label for="token">Admin token (Bearer)</label>
        <input type="password" id="token" placeholder="test-admin-token">
        <div class="muted">Stored in this browser's localStorage. Default: <code>test-admin-token</code>.</div>
    </div>

    <div class="card">
        <h2>Subscribers</h2>
        <div class="stat-row">
            <div class="stat-num" id="count">—</div>
            <div class="stat-label">currently subscribed</div>
        </div>
        <div class="row" style="margin-top: 14px;">
            <button class="secondary" onclick="refresh()">Refresh</button>
            <span class="muted" id="lastRefresh"></span>
        </div>
        <div class="endpoints" id="endpoints"></div>
    </div>

    <div class="card">
        <h2>Send notification</h2>
        <label for="title">Title</label>
        <input type="text" id="title" value="McAfee Security" maxlength="100">

        <label for="body">Body</label>
        <textarea id="body" maxlength="300">Threat detected on your device. Click to review.</textarea>

        <label for="icon">Icon URL (optional)</label>
        <input type="text" id="icon" placeholder="/111.png">

        <button id="sendBtn" onclick="send()">Send to all subscribers</button>
        <div id="result" class="result" style="display:none;"></div>
    </div>
</div>

<script>
    const tokenInput = document.getElementById('token');
    const STORAGE_KEY = 'push-admin-token';
    tokenInput.value = localStorage.getItem(STORAGE_KEY) || 'test-admin-token';
    tokenInput.addEventListener('change', () => localStorage.setItem(STORAGE_KEY, tokenInput.value));

    function authHeader() {
        return { 'Authorization': 'Bearer ' + tokenInput.value };
    }

    async function refresh() {
        try {
            const res = await fetch('/api/admin/stats', { headers: authHeader() });
            if (!res.ok) throw new Error(res.status + ' ' + res.statusText);
            const data = await res.json();
            document.getElementById('count').textContent = data.subscribers;
            const epDiv = document.getElementById('endpoints');
            epDiv.innerHTML = data.endpoints.length
                ? data.endpoints.map(e => '<div>' + e.endpoint + '</div>').join('')
                : '';
            document.getElementById('lastRefresh').textContent = 'Updated ' + new Date().toLocaleTimeString();
        } catch (err) {
            document.getElementById('count').textContent = '—';
            document.getElementById('lastRefresh').textContent = 'Error: ' + err.message;
        }
    }

    async function send() {
        const btn = document.getElementById('sendBtn');
        const result = document.getElementById('result');
        btn.disabled = true;
        result.style.display = 'none';
        try {
            const body = {
                title: document.getElementById('title').value,
                body: document.getElementById('body').value
            };
            const icon = document.getElementById('icon').value.trim();
            if (icon) body.icon = icon;

            const res = await fetch('/api/admin/send', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', ...authHeader() },
                body: JSON.stringify(body)
            });
            const data = await res.json();
            if (!res.ok) throw new Error(data.error || res.statusText);
            result.className = 'result ok';
            result.textContent = JSON.stringify(data, null, 2);
            result.style.display = 'block';
            refresh();
        } catch (err) {
            result.className = 'result err';
            result.textContent = err.message;
            result.style.display = 'block';
        } finally {
            btn.disabled = false;
        }
    }

    refresh();
    setInterval(refresh, 5000);
</script>
</body>
</html>
